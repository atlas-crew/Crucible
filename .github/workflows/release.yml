name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Publish packages that have new versions
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          publish_if_newer() {
            local pkg_dir="$1"
            local pkg_name
            local local_version
            local npm_version

            pkg_name=$(node -p "require('./${pkg_dir}/package.json').name")
            local_version=$(node -p "require('./${pkg_dir}/package.json').version")
            npm_version=$(npm view "${pkg_name}" version 2>/dev/null || echo "0.0.0")

            if [ "$local_version" = "$npm_version" ]; then
              echo "⏭️  ${pkg_name}@${local_version} — already published, skipping"
            else
              echo "📦 ${pkg_name}@${local_version} — publishing (npm has ${npm_version})"
              pnpm --filter "${pkg_name}" publish --access public --no-git-checks
            fi
          }

          publish_if_newer "apps/client"
          publish_if_newer "apps/cli"
          publish_if_newer "packages/crucible"

  docker:
    name: Build & Push Docker Image
    needs: npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: nickcrew/crucible
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
